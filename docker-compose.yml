# =============================================================================
# docker-compose.yml — Aruba ClearPass MCP Server (SSE Transport)
# =============================================================================
# Quick start:
#   1. cp .env.example .env
#   2. Edit .env with your ClearPass credentials
#   3. docker compose up
#
# The MCP server will be available at http://localhost:8000/sse
# =============================================================================

version: "3.9"

services:
  clearpass-mcp:
    build: .
    image: clearpass-mcp:latest
    container_name: clearpass-mcp

    # ---------------------------------------------------------------------------
    # Load config from .env file (never commit .env to version control)
    # ---------------------------------------------------------------------------
    env_file:
      - .env

    # Override defaults if needed
    environment:
      CLEARPASS_LOG_LEVEL: "${CLEARPASS_LOG_LEVEL:-INFO}"
      CLEARPASS_AUDIT_LOG_PATH: "/var/log/clearpass-mcp/audit.jsonl"

    ports:
      - "127.0.0.1:8000:8000"    # bind to loopback only — put nginx in front for public access

    volumes:
      - audit_logs:/var/log/clearpass-mcp

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "clearpass-mcp", "--check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Security hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  audit_logs:
    driver: local
